name: seqdet_no_gaze
lit_module: seqdet

global_stream_name: siglip2-so400m-patch16-224
local_stream_name: dinov2_vits14
pretrained: false
use_local_stream: true
init_from_ckpt: ""
strict_load: false

policy_type: transformer
teacher_hidden_dim: 256
policy_hidden_dim: 192
glimpse_dim: 192
accumulator_hidden_dim: 192
accumulator_backend: gru
patch_grid_size: 24
max_steps: 12
stop_mode: learned_stop
fixed_steps: 12
confidence_threshold: 0.6
stop_threshold: 0.55
policy_layers: 2
policy_heads: 4
dropout: 0.1

training_stage: student
teacher_forcing_ratio: 0.0
teacher_forcing_final: 0.0
scheduled_sampling_ratio: 1.0
scheduled_sampling_final: 1.0
align_loss: mse
use_rl: false
shuffled_gaze: false
shuffle_seed: 42

loss_cls: 1.0
loss_gaze: 0.0
loss_distill: 0.0
loss_align: 0.0
loss_stop: 0.1
loss_rl: 0.0

optimizer:
  lr: 3e-4
  weight_decay: 1e-4
  pos_weight: null
