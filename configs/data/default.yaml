raw_dir: data/raw
processed_dir: data/processed
splits_dir: data/splits
metadata_csv: data/processed/metadata.csv
eye_tracking_csv: data/processed/eye_tracking.csv
processed_fixations_csv: data/processed/processed_fixations.csv
heatmap_dir: data/processed/heatmaps
inspect_report_json: data/processed/dataset_inspection.json
split_report_json: data/splits/split_report.json

allow_synthetic: true
synthetic_num_images: 120
